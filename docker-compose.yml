name: cms-admin-java-ssr

services:
  app:
    container_name: cms-admin-java-ssr
    build: .
    ports:
      - "5006:5006"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5006"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3006}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
